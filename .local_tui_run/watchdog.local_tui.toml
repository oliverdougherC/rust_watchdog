[nfs]
server = "127.0.0.1"

[[shares]]
name = "local_test_videos"
remote_path = "/Users/ofhd/Developer/rust_watchdog/.local_tui_run/ingest_tmp"
local_mount = "/Users/ofhd/Developer/rust_watchdog/.local_tui_run/media_share"

[transcode]
max_average_bitrate_mbps = 25.0
target_codec = "av1"
preset_file = "/Users/ofhd/Developer/rust_watchdog/AV1_MKV.json"
preset_name = "AV1_MKV"
timeout_seconds = 18000
max_retries = 1
min_free_space_multiplier = 2.0

[scan]
video_extensions = [".mkv", ".mp4", ".avi", ".mov", ".webm"]
interval_seconds = 120
include_globs = []
exclude_globs = []
max_files_per_pass = 0
probe_workers = 0

[safety]
min_file_age_seconds = 0
pause_file = "/Users/ofhd/Developer/rust_watchdog/.local_tui_run/watchdog.pause"
max_failures_before_cooldown = 3
cooldown_base_seconds = 300
cooldown_max_seconds = 86400
in_use_guard_enabled = false
in_use_guard_command = "lsof"
recovery_scan_interval_seconds = 43200
share_scan_timeout_seconds = 180
max_consecutive_pass_failures = 3
auto_pause_on_pass_failures = true
quarantine_after_failures = 8
quarantine_failure_codes = [
  "transcode_failed",
  "transcode_error",
  "verification_failed",
  "verification_error",
  "safe_replace_failed",
  "safe_replace_error",
  "source_changed_during_transcode",
]
status_snapshot_stale_seconds = 30

[notify]
webhook_url = ""
events = []
timeout_seconds = 5

[paths]
transcode_temp = "/Users/ofhd/Developer/rust_watchdog/.local_tui_run/transcode_tmp"
database = "/Users/ofhd/Developer/rust_watchdog/.local_tui_run/watchdog.local_tui.db"
log_dir = "/Users/ofhd/Developer/rust_watchdog/.local_tui_run/logs"
status_snapshot = "/Users/ofhd/Developer/rust_watchdog/.local_tui_run/status.json"
event_journal = "/Users/ofhd/Developer/rust_watchdog/.local_tui_run/events.ndjson"
